services:
  api:
    build:
      context: .
    environment:
      APP_NAME: ${APP_NAME:-DMS Backend}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      INFERENCE_RUNNER: ${INFERENCE_RUNNER:-bamti-torch}
      MODEL_PATH: ${MODEL_PATH:-/models/final_model.pth}
      MODEL_DEVICE: ${MODEL_DEVICE:-cpu}
      MODEL_INPUT_SIZE: ${MODEL_INPUT_SIZE:-224}
      MODEL_SCORE_ACTIVATION: ${MODEL_SCORE_ACTIVATION:-softmax}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-7}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-7}
      TORCH_NUM_THREADS: ${TORCH_NUM_THREADS:-7}
      TELEMETRY_RUNS_DIR: ${TELEMETRY_RUNS_DIR:-/app/telemetry_runs}
      MAX_FRAME_BYTES: ${MAX_FRAME_BYTES:-1048576}
      DATABASE_URL: ${DATABASE_URL:-mysql+aiomysql://dms_user:dms_password@mysql:3306/dms}
    ports:
      - "8000:8000"
    volumes:
      - ../model:/models:ro
      - ./telemetry_runs:/app/telemetry_runs

  mysql:
    profiles:
      - persistence
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dms}
      MYSQL_USER: ${MYSQL_USER:-dms_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dms_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dms_root_password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend-dist:/usr/share/nginx/html:ro

volumes:
  mysql-data:
